<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Riverdeck Editor</title>
	<link rel="stylesheet" href="/style.css">
</head>

<body>

	<!-- ── Header ── -->
	<header>
		<h1>Riverdeck Editor</h1>
		<span id="hdr-device"></span>
		<div id="mode-toggle">
			<button id="btn-mode-folder" onclick="setMode('folder')">Folder</button>
			<button id="btn-mode-layout" onclick="setMode('layout')">Layout</button>
		</div>
		<div class="spacer"></div>
		<div id="save-errors"></div>
		<button class="btn-ghost" onclick="showSettings()">&#9881; Config</button>
		<button class="btn-ghost" onclick="reloadFromDisk()">Reload</button>
		<button class="btn-success" onclick="saveLayout()">Save</button>
	</header>

	<!-- ── Body ── -->
	<div id="body">

		<!-- ── Left ── -->
		<div id="left">
			<!-- page tabs -->
			<div id="page-tabs">
				<span id="tab-add" onclick="addPage()">+ Page</span>
			</div>

			<!-- grid -->
			<div id="grid-scroll">
				<div id="deck-grid"></div>
			</div>

			<!-- button config -->
			<div id="config-panel">
				<div id="config-panel-header">
					<h3 id="config-panel-title">Button config</h3>
					<div id="config-tabs" style="display:none">
						<button id="ctab-form" class="active" onclick="switchConfigTab('form')">Properties</button>
						<button id="ctab-monaco" onclick="switchConfigTab('monaco')" style="display:none">Lua
							editor</button>
					</div>
				</div>
				<div id="config-body">
					<div id="form-tab">
						<p id="form-hint" style="color:var(--txt3);font-size:.82rem;padding:8px">Click a button to edit
							it</p>
					</div>
					<div id="monaco-tab"></div>
				</div>
				<div id="btn-actions" style="display:none">
					<button class="btn-danger" onclick="deleteButton()">Delete</button>
					<button class="btn-primary" onclick="applyButton()">Apply</button>
				</div>
			</div>
		</div>

		<!-- ── Right: package browser ── -->
		<div id="pkg-panel">
			<div id="pkg-panel-header">
				<h3>Packages</h3>
			</div>
			<input id="pkg-search" type="search" placeholder="Filter templates..." oninput="renderPackages()">
			<div id="pkg-body"></div>
		</div>
	</div>

	<!-- ── App settings overlay ── -->
	<div id="settings-overlay" onclick="if(event.target===this)hideSettings()">
		<div id="settings-box">
			<div id="settings-box-header">
				<h2>App Settings <span style="color:var(--txt3);font-size:.72rem;font-weight:400">(config.yml)</span>
				</h2>
				<button class="btn-ghost" style="padding:2px 8px" onclick="hideSettings()">&#x2715;</button>
			</div>
			<div id="settings-body">
				<h4>Application</h4>
				<div class="form-row"><label>Brightness (%)</label><input id="scfg-brightness" type="number" min="5"
						max="100" step="5"></div>
				<div class="form-row"><label>Passive FPS</label><input id="scfg-fps" type="number" min="1" max="60">
				</div>
				<div class="form-row"><label>Sleep timeout (seconds &mdash; 0 = never)</label><input id="scfg-timeout"
						type="number" min="0"></div>
				<div class="form-row"><label>Debug mode</label><select id="scfg-debug">
						<option value="false">Off</option>
						<option value="true">On</option>
					</select></div>
				<h4>UI</h4>
				<div class="form-row"><label>Navigation style</label>
					<select id="scfg-navstyle">
						<option value="folder">Folder</option>
						<option value="layout">Layout</option>
						<option value="auto">Auto (layout.json if present)</option>
					</select>
				</div>
				<div class="form-row"><label>Show hidden files</label>
					<select id="scfg-hidden">
						<option value="false">No</option>
						<option value="true">Yes</option>
					</select>
				</div>
				<h4>Network</h4>
				<div class="form-row"><label>HTTP timeout (seconds)</label><input id="scfg-httptmo" type="number"
						min="1"></div>
				<div class="form-row"><label>Verify SSL</label>
					<select id="scfg-ssl">
						<option value="true">Yes</option>
						<option value="false">No</option>
					</select>
				</div>
			</div>
			<div id="settings-footer">
				<span style="font-size:.72rem;color:var(--txt3);align-self:center;flex:1">Restart Riverdeck to apply
					changes.</span>
				<button class="btn-ghost" onclick="hideSettings()">Cancel</button>
				<button class="btn-success" onclick="saveSettings()">Save</button>
			</div>
		</div>
	</div>

	<div id="toast"></div>

	<!-- Monaco loader (served via caching proxy) -->
	<script src="/api/monaco/vs/loader.js"></script>

	<script src="/editor.js"></script>
</body>

</html>

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: windows-latest
          - os: ubuntu-22.04 # Wails v2 needs webkit2gtk-4.0 (dropped in 24.04)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      # ---------- Windows-only deps ----------
      - name: Install go-winres
        if: runner.os == 'Windows'
        run: go install github.com/tc-hib/go-winres@latest

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y --no-progress

      # ---------- Linux-only deps ----------
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libgl1-mesa-dev libxxf86vm-dev \
            libayatana-appindicator3-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libudev-dev upx

      # ---------- Build ----------
      - name: Build
        run: mage build

      # ---------- Compress with UPX ----------
      - name: Compress binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem dist -Recurse -File | ForEach-Object { upx --best $_.FullName }

      - name: Compress binaries (Linux)
        if: runner.os == 'Linux'
        run: find dist -type f | xargs upx --best

      # ---------- Upload flat binaries ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**

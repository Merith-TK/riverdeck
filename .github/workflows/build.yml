name: Build

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*.*.*"
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: windows-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      # ---------- Windows-only deps ----------
      - name: Install go-winres
        if: runner.os == 'Windows'
        run: go install github.com/tc-hib/go-winres@latest

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y --no-progress

      # ---------- Linux-only deps ----------
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libgl1-mesa-dev libxxf86vm-dev \
            libayatana-appindicator3-dev libgtk-3-dev \
            libudev-dev upx

      # ---------- Lint ----------
      - name: Install golangci-lint
        if: runner.os == 'Linux'
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        if: runner.os == 'Linux'
        run: golangci-lint run ./...
        continue-on-error: true  # TODO: remove after lint fixes

      - name: Generate icons
        run: mage icons

      - name: Run go vet
        run: go vet ./...

      # ---------- Test ----------
      - name: Test
        run: go test -v -count=1 -coverprofile=coverage.out ./pkg/...

      - name: Display coverage summary
        run: go tool cover -func=coverage.out | tail -5

      # ---------- Build ----------
      - name: Build
        run: mage build

      # ---------- Compress with UPX ----------
      - name: Compress binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem dist -Recurse -File | ForEach-Object { upx --best $_.FullName }

      - name: Compress binaries (Linux)
        if: runner.os == 'Linux'
        run: find dist -type f | xargs upx --best

      # ---------- Upload artifacts (retained for 30 days) ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ github.sha }}
          path: dist/**
          retention-days: 30
          if-no-files-found: error
